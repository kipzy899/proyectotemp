<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard DHT22 ESP32</title>
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm",
      "chart.js": "https://cdn.jsdelivr.net/npm/chart.js@4.4.1/+esm"
    }
  }
  </script>
  <style>
    body { font-family: system-ui; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
   .container { max-width: 1200px; margin: 0 auto; }
   .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
   .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
   .card h3 { margin: 0 0 8px 0; color: #94a3b8; font-size: 14px; }
   .card p { margin: 0; font-size: 32px; font-weight: 700; }
   .temp { color: #f87171; }
   .hum { color: #60a5fa; }
   .chart-container { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
   .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
   .online { background: #22c55e; }
   .offline { background: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard ESP32 + DHT22 <span id="status"><span class="status offline"></span>Desconectado</span></h1>

    <div class="cards">
      <div class="card">
        <h3>TEMPERATURA ACTUAL</h3>
        <p class="temp"><span id="temp-actual">--</span>°C</p>
      </div>
      <div class="card">
        <h3>HUMEDAD ACTUAL</h3>
        <p class="hum"><span id="hum-actual">--</span>%</p>
      </div>
      <div class="card">
        <h3>ÚLTIMA LECTURA</h3>
        <p style="font-size: 18px;" id="ultima-fecha">--</p>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
